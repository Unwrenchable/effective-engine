<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Effective Engine Harness</title>
    <style>
      :root {
        --bg: #0a0a0a;
        --panel: #111111;
        --border: #262626;
        --text: #f5f5f5;
        --muted: #a3a3a3;
        --accent: #10b981;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #171717 0%, var(--bg) 60%);
        color: var(--text);
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: min(860px, 100%);
        border: 1px solid var(--border);
        border-radius: 14px;
        background: color-mix(in srgb, var(--panel) 86%, transparent);
        backdrop-filter: blur(8px);
        padding: 16px;
      }
      h1 { margin: 0 0 8px; font-size: 1.15rem; }
      .subtitle { margin: 0 0 14px; color: var(--muted); font-size: 0.9rem; }

      .console {
        height: 340px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #050505;
        padding: 12px;
      }

      .msg { margin-bottom: 12px; }
      .role {
        text-transform: uppercase;
        font-size: 0.72rem;
        color: var(--muted);
        margin-bottom: 4px;
        letter-spacing: 0.06em;
      }
      .content {
        white-space: pre-wrap;
        font-size: 0.93rem;
        line-height: 1.5;
      }

      .empty {
        color: #737373;
        font-size: 0.88rem;
      }

      .error {
        margin-top: 10px;
        font-size: 0.8rem;
        color: #fda4af;
        border: 1px solid #7f1d1d;
        background: rgba(127, 29, 29, 0.2);
        border-radius: 8px;
        padding: 8px;
      }

      .toolbar {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .pill {
        display: inline-block;
        border: 1px solid #3f3f46;
        border-radius: 999px;
        padding: 2px 8px;
        margin-right: 6px;
      }

      .clear-btn {
        background: #27272a;
        border: 1px solid #3f3f46;
      }
      .clear-btn:hover { background: #3f3f46; }

      form {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
      }
      input {
        background: #090909;
        border: 1px solid #404040;
        border-radius: 10px;
        color: var(--text);
        font-size: 0.92rem;
        padding: 10px 12px;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
      }
      button {
        background: #059669;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 0.9rem;
        padding: 10px 14px;
        cursor: pointer;
      }
      button:hover { background: #10b981; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <main>
      <section class="card" aria-label="Engine harness">
        <h1>Effective Engine</h1>
        <p class="subtitle">Lightweight harness for testing engines and providers.</p>

        <div id="console" class="console" aria-live="polite"></div>
        <div id="error" class="error" hidden></div>
        <div class="toolbar">
          <div id="meta">Ready.</div>
          <button id="clearBtn" type="button" class="clear-btn">Clear</button>
        </div>

        <form id="form">
          <input id="input" type="text" placeholder="Ask the engine something..." autocomplete="off" />
          <button id="runBtn" type="submit">Run</button>
        </form>
      </section>
    </main>

    <script>
      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const consoleEl = document.getElementById('console');
      const errorEl = document.getElementById('error');
      const runBtn = document.getElementById('runBtn');
      const clearBtn = document.getElementById('clearBtn');
      const metaEl = document.getElementById('meta');

      /** @type {{role:'user'|'assistant'|'system',content:string}[]} */
      let messages = [];
      let loading = false;
      let lastMeta = null;

      function render() {
        if (!messages.length) {
          consoleEl.innerHTML = '<p class="empty">No messages yet. Type something below and hit Run.</p>';
          return;
        }

        consoleEl.innerHTML = messages.map((m) => `
          <div class="msg">
            <div class="role">${m.role}</div>
            <div class="content">${escapeHtml(m.content)}</div>
          </div>
        `).join('');

        consoleEl.scrollTop = consoleEl.scrollHeight;

        if (!lastMeta) {
          metaEl.textContent = loading ? 'Running...' : 'Ready.';
          return;
        }

        const parts = [
          `<span class="pill">provider: ${escapeHtml(lastMeta.provider || 'unknown')}</span>`,
          `<span class="pill">model: ${escapeHtml(lastMeta.model || 'unknown')}</span>`,
          `<span class="pill">latency: ${escapeHtml(String(lastMeta.latencyMs || 0))}ms</span>`,
          `<span class="pill">fallback: ${lastMeta.fallback ? 'yes' : 'no'}</span>`,
        ];
        metaEl.innerHTML = parts.join(' ');
      }

      function setError(msg) {
        if (!msg) {
          errorEl.hidden = true;
          errorEl.textContent = '';
          return;
        }
        errorEl.hidden = false;
        errorEl.textContent = `Error: ${msg}`;
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      async function submitMessage(ev) {
        ev.preventDefault();
        if (loading) return;

        const content = input.value.trim();
        if (!content) return;

        const userMessage = { role: 'user', content };
        messages = [...messages, userMessage];
        input.value = '';
        loading = true;
        runBtn.disabled = true;
        runBtn.textContent = 'Running...';
        setError(null);
        lastMeta = null;
        render();

        try {
          const res = await fetch('/api/engine', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages }),
          });

          if (!res.ok) {
            const text = await res.text();
            throw new Error(text || `HTTP ${res.status}`);
          }

          const data = await res.json();
          const assistantMessage = {
            role: 'assistant',
            content: data.output || 'No response from engine.',
          };
          lastMeta = data.meta || null;
          messages = [...messages, assistantMessage];
          render();
        } catch (err) {
          setError(err && err.message ? err.message : 'Unknown error');
        } finally {
          loading = false;
          runBtn.disabled = false;
          runBtn.textContent = 'Run';
        }
      }

      form.addEventListener('submit', submitMessage);
      clearBtn.addEventListener('click', () => {
        messages = [];
        lastMeta = null;
        setError(null);
        render();
      });
      render();
    </script>
  </body>
</html>
