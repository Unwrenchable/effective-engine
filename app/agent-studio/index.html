<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Studio | Donna Sells LV</title>
    <meta name="description" content="AI Agent Studio for luxury real estate automation and insights." />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .studio-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }
      .agent-card, .workflow-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 1.5rem;
        margin-bottom: 1rem;
        transition: border-color 0.3s;
      }
      .agent-card:hover, .workflow-card:hover {
        border-color: var(--accent);
      }
      .agent-role {
        font-family: var(--serif);
        font-size: 1.25rem;
        color: var(--accent);
        margin-bottom: 0.5rem;
      }
      .agent-description {
        color: var(--muted);
        margin-bottom: 1rem;
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }
      .tag {
        background: var(--ink-dark);
        color: var(--muted);
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        font-size: 0.875rem;
      }
      .run-btn {
        background: var(--accent);
        color: var(--ink-dark);
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
      }
      .input-form {
        margin-top: 1rem;
        display: none;
      }
      .input-form.show {
        display: block;
      }
      .input-field {
        margin-bottom: 0.5rem;
      }
      .input-field label {
        display: block;
        color: var(--text);
        margin-bottom: 0.25rem;
      }
      .input-field input {
        width: 100%;
        padding: 0.5rem;
        background: var(--ink-dark);
        border: 1px solid var(--line);
        border-radius: 4px;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <header style="background: var(--ink-dark); padding: 1rem; text-align: center;">
      <h1 style="color: var(--accent); font-family: var(--serif);">AI Agent Studio</h1>
      <p style="color: var(--muted);">Hive Mind for Luxury Real Estate</p>
    </header>

    <main class="studio-container">
      <section id="agents-section">
        <h2 class="section-title">AI Agents</h2>
        <div id="agents-list"></div>
      </section>

      <section id="workflows-section">
        <h2 class="section-title">Workflows</h2>
        <div id="workflows-list"></div>
      </section>
    </main>

    <script>
      async function loadAgents() {
        try {
          const res = await fetch('/v2/agent-studio/agents');
          const data = await res.json();
          const list = document.getElementById('agents-list');
          data.agents.forEach(agent => {
            const card = document.createElement('div');
            card.className = 'agent-card';
            card.innerHTML = `
              <h3 class="agent-role">${agent.role}</h3>
              <p class="agent-description">${agent.description}</p>
              <div class="tags">${agent.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
              ${agent.id === 'listing-optimizer' ? `
                <div class="input-form" id="form-${agent.id}">
                  <div class="input-field">
                    <label>Address:</label>
                    <input type="text" id="address-${agent.id}" placeholder="123 Luxury St, Las Vegas, NV">
                  </div>
                  <div class="input-field">
                    <label>Beds:</label>
                    <input type="number" id="beds-${agent.id}" placeholder="4">
                  </div>
                  <div class="input-field">
                    <label>Baths:</label>
                    <input type="number" id="baths-${agent.id}" placeholder="3">
                  </div>
                  <div class="input-field">
                    <label>Sqft:</label>
                    <input type="number" id="sqft-${agent.id}" placeholder="3500">
                  </div>
                  <div class="input-field">
                    <label>Price:</label>
                    <input type="number" id="price-${agent.id}" placeholder="1500000">
                  </div>
                </div>
              ` : ''}
              <button class="run-btn" onclick="runAgent('${agent.id}')">Run Agent</button>
            `;
            list.appendChild(card);
          });
        } catch (error) {
          console.error('Failed to load agents:', error);
        }
      }

      async function loadWorkflows() {
        try {
          const res = await fetch('/v2/agent-studio/workflows');
          const data = await res.json();
          const list = document.getElementById('workflows-list');
          data.workflows.forEach(workflow => {
            const card = document.createElement('div');
            card.className = 'workflow-card';
            card.innerHTML = `
              <h3 class="agent-role">${workflow.name}</h3>
              <p class="agent-description">${workflow.description}</p>
              <p>Steps: ${workflow.steps.length}</p>
              <button class="run-btn" onclick="runWorkflow('${workflow.name}')">Run Workflow</button>
            `;
            list.appendChild(card);
          });
        } catch (error) {
          console.error('Failed to load workflows:', error);
        }
      }

      async function runAgent(id) {
        const form = document.getElementById(`form-${id}`);
        let input = {};
        if (form) {
          form.classList.add('show');
          // For demo, collect inputs
          input = {
            address: document.getElementById(`address-${id}`)?.value || '',
            beds: parseInt(document.getElementById(`beds-${id}`)?.value) || 0,
            baths: parseInt(document.getElementById(`baths-${id}`)?.value) || 0,
            sqft: parseInt(document.getElementById(`sqft-${id}`)?.value) || 0,
            price: parseInt(document.getElementById(`price-${id}`)?.value) || 0
          };
        }
        try {
          const res = await fetch('/v2/agent-studio/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'agent', id, input })
          });
          const data = await res.json();
          alert(data.result || data.message);
        } catch (error) {
          console.error('Failed to run agent:', error);
        }
      }

      async function runWorkflow(id) {
        try {
          const res = await fetch('/v2/agent-studio/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'workflow', id })
          });
          const data = await res.json();
          alert(data.message);
        } catch (error) {
          console.error('Failed to run workflow:', error);
        }
      }

      loadAgents();
      loadWorkflows();
    </script>
  </body>
</html>
