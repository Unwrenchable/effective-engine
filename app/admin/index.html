<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin · Donna Sells LV</title>
    <style>
      /* ─── Variables ──────────────────────────────────────────── */
      :root {
        --bg:       #090b10;
        --panel:    #141923;
        --panel2:   #1c2333;
        --text:     #ecedf1;
        --muted:    #b7becd;
        --accent:   #d7b273;
        --line:     #2b3345;
        --ink-dark: #10141e;
        --danger:   #e57373;
        --success:  #81c784;
        --new:      #64b5f6;
        --contacted:#ffb74d;
        --qualified:#81c784;
        --closed:   #b0bec5;
      }
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter","Segoe UI",system-ui,sans-serif;
        font-size: 14px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      button {
        cursor: pointer;
        font: inherit;
        border: none;
        border-radius: 6px;
        padding: 0.45rem 1rem;
        transition: opacity .15s;
      }
      button:hover { opacity: .85; }
      button:disabled { opacity: .45; cursor: not-allowed; }
      input, select, textarea {
        font: inherit;
        background: var(--panel2);
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0.4rem 0.7rem;
        width: 100%;
      }
      input:focus, select:focus, textarea:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      label { display: block; margin-bottom: .3rem; color: var(--muted); font-size: .8rem; }

      /* ─── Login screen ───────────────────────────────────────── */
      #login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .login-box {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 2.5rem 2rem;
        width: 360px;
        text-align: center;
      }
      .login-box h1 { font-size: 1.3rem; margin: 0 0 .3rem; color: var(--accent); }
      .login-box p { color: var(--muted); margin: 0 0 1.5rem; font-size: .85rem; }
      .login-box .field { margin-bottom: 1rem; text-align: left; }
      .btn-primary {
        background: var(--accent);
        color: var(--ink-dark);
        font-weight: 700;
        width: 100%;
        padding: .6rem;
        margin-top: .5rem;
      }
      .login-error { color: var(--danger); font-size: .8rem; margin-top: .6rem; min-height: 1rem; }

      /* ─── App shell ──────────────────────────────────────────── */
      #app { display: none; flex-direction: column; }
      #app.visible { display: flex; }

      .topbar {
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        padding: .6rem 1.2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-shrink: 0;
      }
      .topbar-brand { font-weight: 700; color: var(--accent); font-size: .95rem; }
      .topbar-nav { display: flex; gap: .5rem; }
      .tab-btn {
        background: transparent;
        border: 1px solid transparent;
        color: var(--muted);
        padding: .35rem .8rem;
        border-radius: 6px;
        font-size: .82rem;
      }
      .tab-btn.active {
        background: var(--panel2);
        border-color: var(--line);
        color: var(--text);
      }
      .topbar-right { margin-left: auto; display: flex; gap: .6rem; align-items: center; }
      .topbar-user { color: var(--muted); font-size: .8rem; }
      .btn-logout { background: transparent; border: 1px solid var(--line); color: var(--muted); font-size: .78rem; padding: .3rem .7rem; }

      /* ─── Main content ───────────────────────────────────────── */
      .main-area { flex: 1; overflow: hidden; display: flex; }

      /* ─── Leads panel ────────────────────────────────────────── */
      #leads-panel { display: flex; width: 100%; overflow: hidden; }
      .leads-sidebar {
        width: 340px;
        flex-shrink: 0;
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .leads-filters {
        padding: .7rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: .4rem;
        flex-wrap: wrap;
      }
      .filter-btn {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--muted);
        padding: .25rem .6rem;
        border-radius: 20px;
        font-size: .75rem;
      }
      .filter-btn.active { background: var(--panel2); color: var(--text); border-color: var(--accent); }
      .leads-list { flex: 1; overflow-y: auto; }
      .lead-item {
        padding: .75rem 1rem;
        border-bottom: 1px solid var(--line);
        cursor: pointer;
        transition: background .1s;
      }
      .lead-item:hover { background: var(--panel2); }
      .lead-item.selected { background: var(--panel2); border-left: 3px solid var(--accent); }
      .lead-name { font-weight: 600; font-size: .87rem; }
      .lead-meta { color: var(--muted); font-size: .75rem; margin-top: .15rem; }
      .lead-snippet { color: var(--muted); font-size: .75rem; margin-top: .2rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .badge {
        display: inline-block;
        font-size: .68rem;
        padding: .1rem .45rem;
        border-radius: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: .03em;
      }
      .badge-new       { background: rgba(100,181,246,.15); color: var(--new); }
      .badge-contacted { background: rgba(255,183,77,.15);  color: var(--contacted); }
      .badge-qualified { background: rgba(129,199,132,.15); color: var(--qualified); }
      .badge-closed    { background: rgba(176,190,197,.15); color: var(--closed); }
      .badge-main  { background: rgba(215,178,115,.1); color: var(--accent); }
      .badge-horse { background: rgba(129,199,132,.1); color: var(--qualified); }

      /* ─── Lead detail / thread ───────────────────────────────── */
      .lead-detail {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .detail-header {
        padding: 1rem 1.2rem;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 1rem;
        align-items: flex-start;
        flex-shrink: 0;
      }
      .detail-header-info { flex: 1; }
      .detail-name { font-size: 1.05rem; font-weight: 700; }
      .detail-sub { color: var(--muted); font-size: .8rem; margin-top: .2rem; }
      .detail-actions { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
      .status-select {
        background: var(--panel2);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 6px;
        padding: .3rem .6rem;
        font-size: .8rem;
        width: auto;
      }
      .btn-sm { padding: .3rem .7rem; font-size: .78rem; background: var(--panel2); border: 1px solid var(--line); color: var(--text); }

      /* ─── Thread ─────────────────────────────────────────────── */
      .thread { flex: 1; overflow-y: auto; padding: 1rem 1.2rem; display: flex; flex-direction: column; gap: .75rem; }
      .msg {
        max-width: 72%;
        padding: .6rem .9rem;
        border-radius: 10px;
        font-size: .85rem;
        line-height: 1.5;
      }
      .msg-inbound  { align-self: flex-start; background: var(--panel2); border: 1px solid var(--line); }
      .msg-outbound { align-self: flex-end;   background: rgba(215,178,115,.12); border: 1px solid rgba(215,178,115,.25); }
      .msg-meta { font-size: .7rem; color: var(--muted); margin-top: .25rem; }

      /* ─── Reply box ──────────────────────────────────────────── */
      .reply-box {
        padding: .8rem 1.2rem;
        border-top: 1px solid var(--line);
        flex-shrink: 0;
        display: flex;
        gap: .6rem;
      }
      .reply-box textarea {
        flex: 1;
        resize: none;
        height: 64px;
        font-size: .83rem;
      }
      .btn-send { background: var(--accent); color: var(--ink-dark); font-weight: 700; align-self: flex-end; white-space: nowrap; }

      /* ─── Empty / loading states ─────────────────────────────── */
      .empty-state {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: .9rem;
      }

      /* ─── Sync panel ─────────────────────────────────────────── */
      #sync-panel { display: none; padding: 1.5rem; overflow-y: auto; flex: 1; }
      #sync-panel h2 { font-size: 1rem; margin: 0 0 1rem; color: var(--accent); }
      .sync-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: .8rem; margin-bottom: 1.5rem; }
      .sync-stat {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: .8rem 1rem;
      }
      .sync-stat strong { display: block; font-size: 1.2rem; color: var(--accent); }
      .sync-stat span { color: var(--muted); font-size: .78rem; }
      .sync-actions { display: flex; gap: .6rem; flex-wrap: wrap; }
      .btn-sync { background: var(--panel2); border: 1px solid var(--line); color: var(--text); }
      .sync-log { margin-top: 1rem; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: .8rem; font-size: .78rem; color: var(--muted); min-height: 80px; white-space: pre-wrap; font-family: monospace; }

      /* ─── Scrollbar ──────────────────────────────────────────── */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
    </style>
  </head>
  <body>

    <!-- ─── Login screen ───────────────────────────────────────────── -->
    <div id="login-screen">
      <div class="login-box">
        <h1>Donna Sells LV</h1>
        <p>Admin Panel — sign in to continue</p>
        <div class="field">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" autocomplete="username" placeholder="Donna@donnasellslv.com" />
        </div>
        <div class="field">
          <label for="login-pass">Password</label>
          <input id="login-pass" type="password" autocomplete="current-password" />
        </div>
        <button class="btn-primary" id="login-btn">Sign In</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>

    <!-- ─── App shell ───────────────────────────────────────────────── -->
    <div id="app">

      <div class="topbar">
        <span class="topbar-brand">Donna Sells LV · Admin</span>
        <nav class="topbar-nav">
          <button class="tab-btn active" id="tab-leads" onclick="showTab('leads')">Leads</button>
          <button class="tab-btn"        id="tab-sync"  onclick="showTab('sync')">MLS Sync</button>
        </nav>
        <div class="topbar-right">
          <span class="topbar-user" id="topbar-user"></span>
          <button class="btn-logout" onclick="logout()">Sign out</button>
        </div>
      </div>

      <div class="main-area">

        <!-- Leads panel -->
        <div id="leads-panel">
          <div class="leads-sidebar">
            <div class="leads-filters" id="leads-filters">
              <button class="filter-btn active" data-status="" onclick="setFilter('')">All</button>
              <button class="filter-btn" data-status="new"       onclick="setFilter('new')">New</button>
              <button class="filter-btn" data-status="contacted" onclick="setFilter('contacted')">Contacted</button>
              <button class="filter-btn" data-status="qualified" onclick="setFilter('qualified')">Qualified</button>
              <button class="filter-btn" data-status="closed"    onclick="setFilter('closed')">Closed</button>
            </div>
            <div class="leads-list" id="leads-list">
              <div class="empty-state">Loading leads…</div>
            </div>
          </div>

          <div class="lead-detail" id="lead-detail">
            <div class="empty-state">Select a lead to view the conversation</div>
          </div>
        </div>

        <!-- Sync panel -->
        <div id="sync-panel">
          <h2>MLS Sync · GLVAR / Spark Platform</h2>
          <div class="sync-stats" id="sync-stats">
            <div class="sync-stat"><strong id="stat-total">—</strong><span>Total listings</span></div>
            <div class="sync-stat"><strong id="stat-active">—</strong><span>Active listings</span></div>
            <div class="sync-stat"><strong id="stat-last-sync">—</strong><span>Last delta sync</span></div>
          </div>
          <div class="sync-actions">
            <button class="btn-sync" onclick="triggerSync('delta')">▶ Delta Sync</button>
            <button class="btn-sync" onclick="triggerSync('full')">⟳ Full Sync</button>
            <button class="btn-sm"   onclick="verifyReso()">✓ Verify RESO Connection</button>
          </div>
          <div class="sync-log" id="sync-log">Ready.</div>
        </div>

      </div>
    </div>

    <script>
    /* ──────────────────────────────────────────────────────────────────────
       Admin panel — pure vanilla JS, no frameworks.
       JWT stored in sessionStorage (cleared on tab close).
    ────────────────────────────────────────────────────────────────────── */

    var TOKEN_KEY = 'dsllv_admin_token';
    var token     = sessionStorage.getItem(TOKEN_KEY) || '';
    var currentFilter = '';
    var currentLeadId = null;

    // ── Bootstrap ────────────────────────────────────────────────────────────

    (function init() {
      if (token) {
        showApp();
      }
    })();

    // ── Login ────────────────────────────────────────────────────────────────

    document.getElementById('login-btn').addEventListener('click', doLogin);
    document.getElementById('login-pass').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      var email = document.getElementById('login-email').value.trim();
      var pass  = document.getElementById('login-pass').value;
      var errEl = document.getElementById('login-error');
      errEl.textContent = '';

      if (!email || !pass) { errEl.textContent = 'Email and password required.'; return; }

      var btn = document.getElementById('login-btn');
      btn.disabled = true; btn.textContent = 'Signing in…';

      apiFetch('/v2/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email: email, password: pass }),
      }, false)
        .then(function (d) {
          token = d.token;
          sessionStorage.setItem(TOKEN_KEY, token);
          showApp();
        })
        .catch(function (err) {
          errEl.textContent = err.message || 'Sign-in failed.';
        })
        .finally(function () { btn.disabled = false; btn.textContent = 'Sign In'; });
    }

    function logout() {
      sessionStorage.removeItem(TOKEN_KEY);
      token = '';
      location.reload();
    }

    // ── App shell ────────────────────────────────────────────────────────────

    function showApp() {
      document.getElementById('login-screen').style.display = 'none';
      var app = document.getElementById('app');
      app.style.display = 'flex';
      app.classList.add('visible');

      // Load user info
      apiFetch('/v2/auth/me')
        .then(function (d) {
          var u = d.user || d;
          document.getElementById('topbar-user').textContent = u.full_name || u.email || '';
          if (u.role !== 'admin') {
            logout();
            alert('Admin access required.');
          }
        })
        .catch(function () { logout(); });

      loadLeads();
    }

    function showTab(tab) {
      document.getElementById('leads-panel').style.display = tab === 'leads' ? 'flex'  : 'none';
      document.getElementById('sync-panel').style.display  = tab === 'sync'  ? 'flex'  : 'none';
      document.getElementById('tab-leads').classList.toggle('active', tab === 'leads');
      document.getElementById('tab-sync').classList.toggle('active',  tab === 'sync');
      if (tab === 'sync') loadSyncStatus();
    }

    // ── Leads list ───────────────────────────────────────────────────────────

    function setFilter(status) {
      currentFilter = status;
      currentLeadId = null;
      document.querySelectorAll('.filter-btn').forEach(function (b) {
        b.classList.toggle('active', b.dataset.status === status);
      });
      loadLeads();
    }

    function loadLeads() {
      var listEl = document.getElementById('leads-list');
      listEl.innerHTML = '<div class="empty-state">Loading…</div>';

      var qs = currentFilter ? '?status=' + encodeURIComponent(currentFilter) : '';
      apiFetch('/v2/admin/leads' + qs)
        .then(function (d) { renderLeadList(d.leads || []); })
        .catch(function (err) {
          listEl.innerHTML = '<div class="empty-state" style="color:var(--danger)">Failed to load: ' + escHtml(err.message) + '</div>';
        });
    }

    function renderLeadList(leads) {
      var listEl = document.getElementById('leads-list');
      if (!leads.length) {
        listEl.innerHTML = '<div class="empty-state">No leads found.</div>';
        return;
      }
      listEl.innerHTML = leads.map(function (l) {
        var sourceBadge = l.lead_source === 'horse_site'
          ? '<span class="badge badge-horse">Horse</span>'
          : '<span class="badge badge-main">Main</span>';
        return '<div class="lead-item' + (l.id === currentLeadId ? ' selected' : '') + '" data-id="' + l.id + '" onclick="openLead(' + l.id + ')">'
          + '<div class="lead-name">' + escHtml(l.name) + ' ' + sourceBadge + ' <span class="badge badge-' + l.status + '">' + escHtml(l.status) + '</span></div>'
          + '<div class="lead-meta">' + escHtml(l.email) + (l.phone ? ' · ' + escHtml(l.phone) : '') + ' · ' + fmtDate(l.created_at) + '</div>'
          + (l.last_message ? '<div class="lead-snippet">' + escHtml(l.last_message) + '</div>' : '')
          + '</div>';
      }).join('');
    }

    // ── Lead detail ──────────────────────────────────────────────────────────

    function openLead(id) {
      currentLeadId = id;
      // Highlight selected
      document.querySelectorAll('.lead-item').forEach(function (el) {
        el.classList.toggle('selected', parseInt(el.dataset.id, 10) === id);
      });

      var detailEl = document.getElementById('lead-detail');
      detailEl.innerHTML = '<div class="empty-state">Loading…</div>';

      apiFetch('/v2/admin/leads/' + id)
        .then(function (d) { renderLeadDetail(d.lead, d.messages); })
        .catch(function (err) {
          detailEl.innerHTML = '<div class="empty-state" style="color:var(--danger)">Error: ' + escHtml(err.message) + '</div>';
        });
    }

    function renderLeadDetail(lead, messages) {
      var detailEl = document.getElementById('lead-detail');

      var subParts = [
        escHtml(lead.email),
        lead.phone ? escHtml(lead.phone) : null,
        lead.listing_id ? 'MLS# ' + escHtml(lead.listing_id) : null,
        lead.lead_source === 'horse_site' ? '🐎 Horse site' : '🏠 Main site',
        lead.subscribe_to_updates ? '📧 Update opt-in' : null,
      ].filter(Boolean);

      detailEl.innerHTML =
        '<div class="detail-header">'
          + '<div class="detail-header-info">'
            + '<div class="detail-name">' + escHtml(lead.name) + '</div>'
            + '<div class="detail-sub">' + subParts.join(' &nbsp;·&nbsp; ') + '</div>'
          + '</div>'
          + '<div class="detail-actions">'
            + '<select class="status-select" id="status-select" onchange="updateStatus(' + lead.id + ', this.value)">'
              + ['new','contacted','qualified','closed'].map(function (s) {
                  return '<option value="' + s + '"' + (lead.status === s ? ' selected' : '') + '>' + capitalise(s) + '</option>';
                }).join('')
            + '</select>'
            + '<button class="btn-sm" onclick="editNotes(' + lead.id + ')">📝 Notes</button>'
          + '</div>'
        + '</div>'
        + '<div class="thread" id="thread-' + lead.id + '">'
          + (messages.length ? messages.map(function (m) { return renderMsg(m); }).join('') : '<div class="empty-state" style="font-size:.8rem">No messages yet.</div>')
        + '</div>'
        + '<div class="reply-box">'
          + '<textarea id="reply-input" placeholder="Type a reply or note…" rows="3"></textarea>'
          + '<button class="btn-send" onclick="sendReply(' + lead.id + ')">Send</button>'
        + '</div>';

      // Scroll thread to bottom
      var thread = document.getElementById('thread-' + lead.id);
      if (thread) thread.scrollTop = thread.scrollHeight;
    }

    function renderMsg(m) {
      var dir  = m.direction === 'inbound' ? 'msg-inbound' : 'msg-outbound';
      var who  = m.direction === 'inbound' ? 'Lead' : (m.author_name || 'Donna');
      return '<div class="msg ' + dir + '">'
        + '<div>' + escHtml(m.body) + '</div>'
        + '<div class="msg-meta">' + escHtml(who) + ' · ' + fmtDate(m.created_at) + '</div>'
        + '</div>';
    }

    function sendReply(leadId) {
      var input = document.getElementById('reply-input');
      var body  = (input.value || '').trim();
      if (!body) return;

      input.disabled = true;

      apiFetch('/v2/admin/leads/' + leadId + '/messages', {
        method: 'POST',
        body: JSON.stringify({ body: body }),
      })
        .then(function (d) {
          input.value = '';
          // Append the new message to the thread
          var thread = document.getElementById('thread-' + leadId);
          if (thread) {
            var placeholder = thread.querySelector('.empty-state');
            if (placeholder) placeholder.remove();
            thread.insertAdjacentHTML('beforeend', renderMsg(d.message));
            thread.scrollTop = thread.scrollHeight;
          }
          // Refresh lead list snippet
          loadLeads();
        })
        .catch(function (err) { alert('Failed to send: ' + err.message); })
        .finally(function () { input.disabled = false; input.focus(); });
    }

    function updateStatus(leadId, status) {
      apiFetch('/v2/admin/leads/' + leadId, {
        method: 'PATCH',
        body: JSON.stringify({ status: status }),
      })
        .then(function () { loadLeads(); })
        .catch(function (err) { alert('Update failed: ' + err.message); });
    }

    function editNotes(leadId) {
      var notes = prompt('Notes for this lead:');
      if (notes === null) return;
      apiFetch('/v2/admin/leads/' + leadId, {
        method: 'PATCH',
        body: JSON.stringify({ notes: notes }),
      })
        .then(function () { openLead(leadId); })
        .catch(function (err) { alert('Failed: ' + err.message); });
    }

    // ── Sync panel ───────────────────────────────────────────────────────────

    function loadSyncStatus() {
      apiFetch('/v2/admin/sync/status')
        .then(function (d) {
          document.getElementById('stat-total').textContent  = d.total_listings  || '—';
          document.getElementById('stat-active').textContent = d.active_listings || '—';
          document.getElementById('stat-last-sync').textContent = d.last_sync_at ? fmtDate(d.last_sync_at) : 'Never';
        })
        .catch(function (err) {
          document.getElementById('sync-log').textContent = 'Status error: ' + err.message;
        });
    }

    function triggerSync(type) {
      var logEl = document.getElementById('sync-log');
      logEl.textContent = 'Starting ' + type + ' sync…';
      apiFetch('/v2/admin/sync', { method: 'POST', body: JSON.stringify({ type: type }) })
        .then(function (d) {
          logEl.textContent = d.message + '\n(Sync is running in background — refresh status in a few minutes.)';
          setTimeout(loadSyncStatus, 5000);
        })
        .catch(function (err) { logEl.textContent = 'Sync error: ' + err.message; });
    }

    function verifyReso() {
      var logEl = document.getElementById('sync-log');
      logEl.textContent = 'Verifying RESO / Spark Platform connection…';
      apiFetch('/v2/admin/reso/verify')
        .then(function (d) {
          logEl.textContent = d.mock
            ? '⚠ MOCK mode active (RESO_MOCK=true). Set RESO_MOCK=false and add RESO credentials to go live.\nEndpoint: ' + d.endpoint
            : '✓ Connected to ' + d.endpoint;
        })
        .catch(function (err) { logEl.textContent = '✗ Connection failed: ' + err.message; });
    }

    // ── Helpers ──────────────────────────────────────────────────────────────

    function apiFetch(path, opts, useAuth) {
      if (useAuth === undefined) useAuth = true;
      var options = Object.assign({ headers: {} }, opts || {});
      if (useAuth && token) options.headers['Authorization'] = 'Bearer ' + token;
      options.headers['Content-Type'] = 'application/json';
      options.headers['Accept']       = 'application/json';
      return fetch(path, options).then(function (res) {
        if (res.status === 401) { logout(); throw new Error('Session expired.'); }
        return res.json().then(function (d) {
          if (!res.ok) throw new Error(d.error || ('HTTP ' + res.status));
          return d;
        });
      });
    }

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function capitalise(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

    function fmtDate(iso) {
      if (!iso) return '';
      try {
        return new Date(iso).toLocaleString('en-US', {
          month:'short', day:'numeric', hour:'2-digit', minute:'2-digit',
        });
      } catch { return iso; }
    }

    // Initial tab state
    showTab('leads');
    </script>
  </body>
</html>
